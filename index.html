<!DOCTYPE html>
<html>
<head>
    <title>Cubi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <canvas id="gameCanvas"></canvas>

    <button id="settingsButton">⚙</button>
    <div id="settingsMenu">
        
        <h2>Ajustes</h2>

<div class="setting">

    <span>Visión</span>

    <button id="visionMenos">-</button>

    <span id="visionValor">2.0</span>

    <button id="visionMas">+</button>

</div>

<div class="setting">

    <span>Joystick</span>

    <button id="joystickMenos">-</button>

    <span id="joystickValor">0.5</span>

    <button id="joystickMas">+</button>

</div>
<div class="setting">

    <span>Opacidad</span>

    <button id="opacidadMenos">-</button>

    <span id="opacidadValor">0.5</span>

    <button id="opacidadMas">+</button>

</div>
<div class="setting">

    <span>Diálogos</span>

    <button id="dialogoMenos">-</button>

    <span id="dialogoValor">0.5</span>

    <button id="dialogoMas">+</button>

</div>
<div class="setting">

    <span>HIU</span>

    <button id="hiuMenos">-</button>

    <span id="hiuValor">1.0</span>

    <button id="hiuMas">+</button>

</div>

<button id="closeSettings">Cerrar</button>

</div>

    <div id="bossBars"></div>

</div>
    <div id="bossBars"></div>
</div>

<div id="flashScreen"></div>

<div id="victoryText">
    ¡EN HORABUENA!
</div>

        <div id="playerLives">
            <div class="life"></div>
            <div class="life"></div>
            <div class="life"></div>
        </div>
        <div id="warningMessage">Necesitas la llave del jefe</div>
        <div id="warningMessage2"><img src="https://img.icons8.com/ios-filled/50/ffffff/hand-cursor.png"></div>
        <div id="joystick">
    <div id="stick"></div>
</div>
        <div class="grab-control" id="grabButton"><img src="https://img.icons8.com/ios-filled/50/ffffff/hand-cursor.png" alt="Grab">
        <div class="button attack-control" id="attackButton"><img src="https://img.icons8.com/?size=100&id=Za75IlSNETEC&format=png&color=000000" alt="attack"></div>
        </div>
        <div class="inventory">
            <div class="inventory-item" id="inventoryKey"><img src="https://img.icons8.com/ios-filled/50/ffffff/key.png" alt="Key"></div>
            <div class="inventory-item" id="inventoryMasterKey"><img src="https://img.icons8.com/?size=100&id=qOIneWWu24WI&format=png&color=000000"></div>
        </div>
        <div id="dialogBox">

    <img id="dialogPortrait" src="boss.png">

    <div id="dialogContent">
        
        <div id="dialogNameEnemy"></div>

        <div id="dialogName"></div>

        <div id="dialogText"></div>

        <button id="nextDialog">▶</button>

    </div>
    <audio id="dialogBeep" src="bip.mp3" preload="auto"></audio>


    <script src="player.js"></script>
    <script src="enemigo.js"></script>
    <script src="salasJefe.js"></script>
    <script src="boss.js"></script>
    <script src="bossAttacks.js"></script>
    <script src="bossBar.js"></script>
    <script src="ajustes.js"></script>
    <script src="controles.js"></script>
    <script src="dialogos.js"></script>
    <script src="game.js"></script>
</body>
</html>
